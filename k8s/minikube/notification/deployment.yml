apiVersion: apps/v1
kind: Deployment

metadata:
  name: notification-service
  labels:
    app: notification-service

spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      restartPolicy: Always
      containers:
        - name: notification-service
          image: wanemar/notification:1.0.0
          imagePullPolicy: Always
          ports:
            - containerPort: 9002
          envFrom:
            - configMapRef:
                name: common-env-config
                optional: false
          env:
            - name: NOTIFICATION_DB_URL
              valueFrom:
                secretKeyRef:
                  name: notification-secrets
                  key: ndb-url
            - name: NOTIFICATION_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: notification-secrets
                  key: ndb-username
            - name: NOTIFICATION_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: notification-secrets
                  key: ndb-password