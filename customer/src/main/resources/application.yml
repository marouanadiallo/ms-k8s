server:
  port: 9000

eureka:
  client:
    enabled: false

spring:
  application:
    name: customer-service
  main:
    banner-mode: off
  config:
    import: "classpath:rabbitmq-config.yml"

  datasource:
    url: ${CUSTOMER_DB_URL:jdbc:postgresql://localhost:5432/customerdb}
    username: ${CUSTOMER_DB_USERNAME:msstrainz}
    password: ${CUSTOMER_DB_PASSWORD:password}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      auto-commit: false
      idle-timeout: 30000
      connection-timeout: 20000
      max-lifetime: 1800000
      transaction-isolation: TRANSACTION_READ_COMMITTED
  zipkin:
    base-url: ${ZIPKIN_BASE_URL:http://localhost:9411}

management:
  tracing:
    sampling:
      probability: 1.0
logging:
  pattern:
    correlation: "[%X{ traceId:-},%X{ spanId:-}]"